{% extends "base.html" %}
{% block title %}编辑个人信息{% endblock %}
{% block content %}
    <h1>✏️ 编辑个人信息</h1>

    <form method="POST" action="/profile/edit">
        <div class="form-group">
            <label>用户名：</label>
            <input type="text" value="{{ user.username }}" disabled class="input-disabled">
        </div>
        <div class="form-group">
            <label>邮　箱：</label>
            <input type="email" name="email" value="{{ user.email }}" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
            <label>手机号：</label>
            <input type="text" name="phone" value="{{ user.phone }}" placeholder="11位大陆手机号">
        </div>
        <button type="submit">保存修改</button>
    </form>

    {% if errors %}
        {% for e in errors %}
            <div class="flash error">{{ e }}</div>
        {% endfor %}
    {% endif %}

    <div class="footer-links">
        <a href="{{ url_for('profile') }}">← 返回个人中心</a>
    </div>
{% endblock %}
