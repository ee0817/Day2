{% extends "base.html" %}
{% block title %}编辑用户{% endblock %}
{% block content %}
    <h1>✏️ 编辑用户</h1>
    <p>用户名：<strong>{{ user.username }}</strong></p>

    <form method="POST" action="/admin/user/{{ user.id }}/edit">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label>邮　箱：</label>
            <input type="email" name="email" value="{{ user.email }}" required>
        </div>
        <div class="form-group">
            <label>手机号：</label>
            <input type="text" name="phone" value="{{ user.phone }}" placeholder="选填">
        </div>
        <div class="form-group">
            <label>余　额：</label>
            <input type="number" name="balance" value="{{ user.balance }}" step="0.01">
        </div>
        <div class="form-group">
            <label>角　色：</label>
            <select name="role">
                <option value="user" {% if user.role == 'user' %}selected{% endif %}>普通用户</option>
                <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>管理员</option>
            </select>
        </div>
        <button type="submit">保存修改</button>
    </form>

    <div class="footer-links">
        <a href="{{ url_for('admin_panel') }}">← 返回管理面板</a>
    </div>
{% endblock %}
