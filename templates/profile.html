{% extends "base.html" %}
{% block title %}个人中心{% endblock %}
{% block content %}
    <div class="card">
        <h2 class="card-title">👤 个人中心</h2>

        <div class="info">
            <div class="info-row"><span class="info-label">用户ID</span><span>{{ user.id }}</span></div>
            <div class="info-row"><span class="info-label">用户名</span><span>{{ user.username }}</span></div>
            <div class="info-row"><span class="info-label">邮箱</span><span>{{ user.email or '未设置' }}</span></div>
            <div class="info-row"><span class="info-label">手机</span><span>{{ user.phone or '未设置' }}</span></div>
            <div class="info-row"><span class="info-label">余额</span><span>¥{{ '%.2f'|format(user.balance) }}</span></div>
        </div>

        <h3 style="margin-bottom:16px;font-size:16px;color:#333;text-align:center;">💰 充值</h3>
        <form method="POST" action="/recharge">
            <input type="hidden" name="user_id" value="{{ user.id }}">
            <div class="form-group">
                <label for="amount">充值金额</label>
                <input type="number" id="amount" name="amount" step="0.01" placeholder="输入金额（可正可负）" required>
            </div>
            <button type="submit" class="btn btn-primary">确认充值</button>
        </form>

        <div style="text-align:center;margin-top:16px;">
            <a href="/" style="color:#667eea;text-decoration:none;font-size:14px;">← 返回首页</a>
        </div>
    </div>
{% endblock %}
