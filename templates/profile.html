{% extends "base.html" %}
{% block title %}个人中心{% endblock %}
{% block content %}
    <h1>👤 个人中心</h1>

    <div class="info">
        <div class="info-row"><span class="info-label">用户名</span><span>{{ user.username }}</span></div>
        <div class="info-row"><span class="info-label">角色</span><span class="badge {{ user.role }}">{{ user.role }}</span></div>
        <div class="info-row"><span class="info-label">邮箱</span><span>{{ user.email or '未设置' }}</span></div>
        <div class="info-row"><span class="info-label">手机</span><span>{{ user.phone or '未设置' }}</span></div>
        <div class="info-row"><span class="info-label">余额</span><span>¥{{ '%.2f'|format(user.balance) }}</span></div>
        <div class="info-row"><span class="info-label">注册时间</span><span>{{ user.created_at }}</span></div>
    </div>

    <div class="links">
        <a href="{{ url_for('profile_edit') }}">✏️ 编辑个人信息</a>
        <a href="{{ url_for('change_password') }}">🔑 修改密码</a>
        <form action="{{ url_for('logout') }}" method="POST" style="margin-top: 10px;">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button type="submit" class="btn-danger">🚪 退出登录</button>
        </form>
        <a href="{{ url_for('index') }}" class="link-secondary">← 返回首页</a>
    </div>
{% endblock %}
