{% extends "base.html" %}
{% block title %}审计日志{% endblock %}
{% block content %}
    <h1>📋 审计日志</h1>
    <p>最近 100 条操作记录</p>

    <table>
        <tr>
            <th>时间</th>
            <th>用户</th>
            <th>操作</th>
            <th>详情</th>
            <th>IP</th>
        </tr>
        {% for log in logs %}
        <tr>
            <td class="mono">{{ log.created_at }}</td>
            <td>{{ log.username or '-' }}</td>
            <td><span class="badge action-{{ log.action.lower() }}">{{ log.action }}</span></td>
            <td>{{ log.detail }}</td>
            <td class="mono">{{ log.ip }}</td>
        </tr>
        {% endfor %}
    </table>

    <div class="footer-links">
        <a href="{{ url_for('admin_panel') }}">← 返回管理面板</a>
    </div>
{% endblock %}
